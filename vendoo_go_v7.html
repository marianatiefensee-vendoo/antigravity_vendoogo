
<style>
@import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#653CC9;--on-primary:#fff;
  --secondary:#64539B;
  --outline:#7A7486;--outline-variant:#CBC3D7;
  --surface:#FDF7FF;--on-surface:#1D1A24;
  --surface-container:#F2EBF9;--surface-lowest:#fff;
  --surface-dim:#DED7E5;--cr:12px;
}
.wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:16px 0;font-family:'Lexend',sans-serif}
.snav{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:0 8px}
.snav-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--outline-variant);background:transparent;color:var(--outline);font-size:11px;font-weight:500;cursor:pointer;font-family:'Lexend',sans-serif;transition:all .2s}
.snav-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.phones{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;align-items:flex-start}
.phone{width:300px;background:var(--surface-lowest);border-radius:44px;border:8px solid #1a1a2a;overflow:hidden;flex-shrink:0}
.nbar{background:#1a1a2a;display:flex;justify-content:center;padding:8px 0 6px}
.npill{width:88px;height:24px;background:#000;border-radius:0 0 15px 15px}
.sbar{display:flex;justify-content:space-between;align-items:center;padding:6px 16px 4px;background:var(--surface-lowest)}
.screen{background:var(--surface);min-height:580px;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;background:var(--surface-lowest)}
.pips{display:flex;justify-content:center;gap:4px;padding:6px 16px 4px;background:var(--surface-lowest)}
.pip{height:3px;border-radius:2px;background:var(--surface-dim)}
.pip.on{background:var(--primary)}
.stitle{font-size:24px;font-weight:400;color:var(--on-surface);line-height:32px;padding:4px 16px 12px;background:var(--surface-lowest)}
.slabel{font-size:11px;font-weight:500;color:var(--secondary);padding:0 16px 8px;letter-spacing:.5px;text-transform:uppercase}
.fcard{background:var(--surface-lowest);border-radius:var(--cr);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;border:1px solid var(--outline-variant)}
.flbl{font-size:11px;font-weight:500;color:var(--secondary);margin-bottom:2px;letter-spacing:.4px}
.fval{font-size:14px;color:var(--on-surface)}
.eico{opacity:.4;flex-shrink:0}
.btn-p{width:calc(100% - 32px);margin:0 16px;background:var(--primary);color:#fff;border:none;border-radius:var(--cr);padding:14px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Lexend',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-s{width:calc(100% - 32px);margin:8px 16px 0;background:transparent;color:var(--secondary);border:1px solid var(--outline-variant);border-radius:var(--cr);padding:13px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Lexend',sans-serif}
.btn-g{width:calc(100% - 32px);margin:4px 16px 0;background:transparent;color:var(--outline);border:none;padding:10px;font-size:13px;cursor:pointer;font-family:'Lexend',sans-serif}
.btn-d{width:calc(100% - 32px);margin:0 16px;background:var(--surface-dim);color:var(--outline);border:none;border-radius:var(--cr);padding:14px;font-size:14px;font-weight:500;cursor:default;font-family:'Lexend',sans-serif}
.bsticky{padding:12px 0 20px;background:var(--surface-lowest);border-top:1px solid var(--outline-variant)}
.cam{background:#111;height:210px;position:relative;display:flex;align-items:center;justify-content:center}
.camf{position:absolute;inset:16px;border:2px solid rgba(255,255,255,.5);border-radius:8px}
.shut{width:48px;height:48px;border-radius:50%;background:#fff;border:3px solid rgba(255,255,255,.3);position:absolute;bottom:12px;left:50%;transform:translateX(-50%)}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:10px 16px;background:var(--surface)}
.slot{aspect-ratio:1;border-radius:8px;border:1px dashed var(--outline-variant);display:flex;align-items:center;justify-content:center;background:var(--surface-container)}
.slot.f{background:var(--surface-dim);border:none}
.aihero{text-align:center;padding:36px 24px 20px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.spin{width:32px;height:32px;border-radius:50%;border:3px solid var(--surface-container);border-top:3px solid var(--primary);animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.icard{background:var(--surface-container);border-radius:var(--cr);padding:12px 14px;border:1px solid var(--outline-variant);width:100%}
.pbar{height:3px;background:var(--surface-container);border-radius:2px;margin-top:14px;overflow:hidden;width:100%}
.pfill{height:100%;background:var(--primary);border-radius:2px}
.priceh{padding:48px 16px 28px;text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--surface-lowest)}
.mrow{background:var(--surface-lowest);border-radius:var(--cr);padding:12px 14px;margin:0 16px 8px;display:flex;align-items:center;gap:10px;border:1px solid var(--outline-variant)}
.mrow.sel{border:1.5px solid var(--primary);background:var(--surface-container)}
.mlogo{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mcon{background:var(--surface-container);color:var(--secondary);border:1px solid var(--outline-variant);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Lexend',sans-serif}
.ambadge{background:#FFF3CD;color:#856404;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:600}
.pcrd{background:var(--surface-lowest);border-radius:var(--cr);padding:12px;margin:0 16px 10px;display:flex;gap:10px;border:1px solid var(--outline-variant)}
.suc{width:72px;height:72px;border-radius:50%;background:#EAF3DE;margin-bottom:16px;display:flex;align-items:center;justify-content:center}
.conf-chip{display:inline-flex;align-items:center;gap:5px;background:var(--surface-container);border:1px solid var(--outline-variant);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;color:var(--secondary)}
</style>
